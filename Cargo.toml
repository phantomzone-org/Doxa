[workspace]
members = ["tessera-server", "tessera-trees"]
resolver = "2"

[workspace.dependencies]
tessera-trees = {path = "tessera-trees"}
anyhow = "1.0.101"
rand_chacha = "0.10.0"
rand = "0.10.0"
serde = "1.0.228"
serde_json = "1.0.149"
sha2 = "0.10.9"
sha3 = "0.10.8"
digest = "0.10.7"
hex = "0.4.3"
plonky2 = { git = "https://github.com/0xPARC/plonky2.git", rev = "109d517d09c210ae4c2cee381d3e3fbc04aa3812" }
tokio = { version = "1", features = ["full"] }
alloy = { version = "1.6", features = ["full", "node-bindings"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenvy = "0.15"
axum = "0.8"