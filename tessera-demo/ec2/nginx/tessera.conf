# Tessera subpool API reverse proxy
# nginx terminates TLS on public ports 8081/8082/8083 and forwards to
# internal tessera-subpool-database instances on 18081/18082/18083.
#
# DOMAIN is substituted by ec2_setup.sh — do not edit this file directly.
# Let's Encrypt cert paths follow the certbot convention.

ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         HIGH:!aNULL:!MD5;

server {
    listen 8081 ssl;
    server_name DOMAIN;

    location / {
        proxy_pass         http://127.0.0.1:18081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

server {
    listen 8082 ssl;
    server_name DOMAIN;

    location / {
        proxy_pass         http://127.0.0.1:18082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

server {
    listen 8083 ssl;
    server_name DOMAIN;

    location / {
        proxy_pass         http://127.0.0.1:18083;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
