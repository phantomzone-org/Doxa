name: tessera

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/docker/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Sequencer ─────────────────────────────────────────────────────────────────
  sequencer:
    build:
      context: ./src
      dockerfile: tessera-demo/ec2/docker/Dockerfile.sequencer
    restart: unless-stopped
    environment:
      DEMO_RPC_URL: ${RPC_URL}
      DEMO_OPERATOR_KEY: ${OPERATOR_KEY}
      DEMO_CHAIN_ID: ${CHAIN_ID}
      DEMO_BRIDGE_ADDRESS: ${BRIDGE_ADDRESS}
      DEMO_TOKEN_ADDRESS: ${TOKEN_ADDRESS}
      DEMO_BIND_ADDR: 0.0.0.0:3000
      DEMO_BATCH_TIMEOUT_SECS: ${BATCH_TIMEOUT_SECS:-10}
      DEMO_PROVE_DELAY_SECS: ${PROVE_DELAY_SECS:-10}

  # ── Subpool Database APIs ─────────────────────────────────────────────────────
  subpool-db-1:
    build:
      context: ./src
      dockerfile: tessera-demo/ec2/docker/Dockerfile.subpool-db
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?options=-c%20search_path%3Dsubpool_1"
      TESSERA_SUBPOOL_API_ADDR: 0.0.0.0:8080
      SUBPOOL_ID: "1"
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      FAUCET_PRIVATE_KEY: ${OPERATOR_KEY}
      SEPOLIA_RPC_URL: ${RPC_URL}
      USDX_CONTRACT_ADDR: ${TOKEN_ADDRESS}
    depends_on:
      postgres:
        condition: service_healthy

  subpool-db-2:
    build:
      context: ./src
      dockerfile: tessera-demo/ec2/docker/Dockerfile.subpool-db
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?options=-c%20search_path%3Dsubpool_2"
      TESSERA_SUBPOOL_API_ADDR: 0.0.0.0:8080
      SUBPOOL_ID: "2"
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      FAUCET_PRIVATE_KEY: ${OPERATOR_KEY}
      SEPOLIA_RPC_URL: ${RPC_URL}
      USDX_CONTRACT_ADDR: ${TOKEN_ADDRESS}
    depends_on:
      postgres:
        condition: service_healthy

  subpool-db-3:
    build:
      context: ./src
      dockerfile: tessera-demo/ec2/docker/Dockerfile.subpool-db
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?options=-c%20search_path%3Dsubpool_3"
      TESSERA_SUBPOOL_API_ADDR: 0.0.0.0:8080
      SUBPOOL_ID: "3"
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      FAUCET_PRIVATE_KEY: ${OPERATOR_KEY}
      SEPOLIA_RPC_URL: ${RPC_URL}
      USDX_CONTRACT_ADDR: ${TOKEN_ADDRESS}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Subpool Operators ─────────────────────────────────────────────────────────
  operator-1:
    build:
      context: ./src
      dockerfile: tessera-demo/ec2/docker/Dockerfile.operator
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?options=-c%20search_path%3Dsubpool_1"
      DATABASE_MAX_CONNECTIONS: ${OPERATOR_DB_MAX_CONNECTIONS:-5}
      SEQUENCER_URL: http://sequencer:3000
      APPROVAL_PRIVATE_KEY: ${APPROVAL_PRIVATE_KEY}
      RPC_URL: ${RPC_URL}
      ROLLUP_ADDRESS: ${BRIDGE_ADDRESS}
      POLL_INTERVAL_SECS: ${POLL_INTERVAL_SECS:-5}
      SUBPOOL_ID: "1"
    depends_on:
      - sequencer
      - subpool-db-1

  operator-2:
    build:
      context: ./src
      dockerfile: tessera-demo/ec2/docker/Dockerfile.operator
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?options=-c%20search_path%3Dsubpool_2"
      DATABASE_MAX_CONNECTIONS: ${OPERATOR_DB_MAX_CONNECTIONS:-5}
      SEQUENCER_URL: http://sequencer:3000
      APPROVAL_PRIVATE_KEY: ${APPROVAL_PRIVATE_KEY}
      RPC_URL: ${RPC_URL}
      ROLLUP_ADDRESS: ${BRIDGE_ADDRESS}
      POLL_INTERVAL_SECS: ${POLL_INTERVAL_SECS:-5}
      SUBPOOL_ID: "2"
    depends_on:
      - sequencer
      - subpool-db-2

  operator-3:
    build:
      context: ./src
      dockerfile: tessera-demo/ec2/docker/Dockerfile.operator
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?options=-c%20search_path%3Dsubpool_3"
      DATABASE_MAX_CONNECTIONS: ${OPERATOR_DB_MAX_CONNECTIONS:-5}
      SEQUENCER_URL: http://sequencer:3000
      APPROVAL_PRIVATE_KEY: ${APPROVAL_PRIVATE_KEY}
      RPC_URL: ${RPC_URL}
      ROLLUP_ADDRESS: ${BRIDGE_ADDRESS}
      POLL_INTERVAL_SECS: ${POLL_INTERVAL_SECS:-5}
      SUBPOOL_ID: "3"
    depends_on:
      - sequencer
      - subpool-db-3

  # ── nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./nginx/tessera.conf.template:/etc/nginx/templates/tessera.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - subpool-db-1
      - subpool-db-2
      - subpool-db-3

  # ── certbot renewal ───────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres-data:
  certbot-webroot:
