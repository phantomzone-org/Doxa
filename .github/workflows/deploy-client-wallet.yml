name: Deploy demos

on:
  push:
    branches: [demo]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache wasm output — only rebuilds when tessera-client-wasm changes
      - uses: actions/cache@v4
        id: wasm-cache
        with:
          path: tessera-js/wasm
          key: wasm-${{ hashFiles('tessera-client-wasm/src/**', 'tessera-client-wasm/Cargo.toml') }}

      - name: Install Rust + wasm32 target
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        if: steps.wasm-cache.outputs.cache-hit != 'true'

      - name: Install wasm-pack
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        working-directory: tessera-js
        run: npm install && npm run build:wasm

      - name: Install client-wallet deps
        working-directory: demo/client-wallet
        run: npm install

      # ── Entity A ──────────────────────────────────────────────────────────────
      - name: Build client-wallet A
        working-directory: demo/client-wallet
        env:
          VITE_USDX_CONTRACT_ADDR: ${{ secrets.USDX_CONTRACT_ADDR }}
          VITE_SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          VITE_TESSERA_CONTRACT_ADDR: ${{ secrets.TESSERA_CONTRACT_ADDR }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_A }}
          VITE_SUBPOOL_ID_HEX: ${{ secrets.VITE_SUBPOOL_ID_HEX_A }}
          VITE_ASSET_ID_HEX: ${{ secrets.VITE_ASSET_ID_HEX }}
        run: npm run build

      - name: Deploy client-wallet A to Netlify
        run: npx netlify-cli deploy --dir=demo/client-wallet/dist --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_CLIENT_WALLET_A_SITE_ID }}

      # ── Entity B ──────────────────────────────────────────────────────────────
      - name: Build client-wallet B
        working-directory: demo/client-wallet
        env:
          VITE_USDX_CONTRACT_ADDR: ${{ secrets.USDX_CONTRACT_ADDR }}
          VITE_SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          VITE_TESSERA_CONTRACT_ADDR: ${{ secrets.TESSERA_CONTRACT_ADDR }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_B }}
          VITE_SUBPOOL_ID_HEX: ${{ secrets.VITE_SUBPOOL_ID_HEX_B }}
          VITE_ASSET_ID_HEX: ${{ secrets.VITE_ASSET_ID_HEX }}
        run: npm run build

      - name: Deploy client-wallet B to Netlify
        run: npx netlify-cli deploy --dir=demo/client-wallet/dist --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_CLIENT_WALLET_B_SITE_ID }}

      # ── Entity C ──────────────────────────────────────────────────────────────
      - name: Build client-wallet C
        working-directory: demo/client-wallet
        env:
          VITE_USDX_CONTRACT_ADDR: ${{ secrets.USDX_CONTRACT_ADDR }}
          VITE_SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          VITE_TESSERA_CONTRACT_ADDR: ${{ secrets.TESSERA_CONTRACT_ADDR }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_C }}
          VITE_SUBPOOL_ID_HEX: ${{ secrets.VITE_SUBPOOL_ID_HEX_C }}
          VITE_ASSET_ID_HEX: ${{ secrets.VITE_ASSET_ID_HEX }}
        run: npm run build

      - name: Deploy client-wallet C to Netlify
        run: npx netlify-cli deploy --dir=demo/client-wallet/dist --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_CLIENT_WALLET_C_SITE_ID }}

      - name: Deploy landing page to Netlify
        run: npx netlify-cli deploy --dir=demo/landing --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_LANDING_SITE_ID }}
