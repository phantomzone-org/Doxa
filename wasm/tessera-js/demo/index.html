<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tessera passkey demo</title>
    <style>
      body { font-family: sans-serif; max-width: 480px; margin: 3rem auto; }
      button { margin: 0.5rem 0; padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; }
      #status { margin-top: 1rem; color: #555; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h2>Tessera × WebAuthn PRF demo</h2>
    <p>
      Step 1 — register a passkey (creates credential with PRF extension).<br />
      Step 2 — derive your Tessera account from the passkey PRF output.
    </p>
    <button id="btn-register">1. Register passkey</button><br />
    <button id="btn-derive" disabled>2. Derive account</button>
    <pre id="status">Ready.</pre>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
