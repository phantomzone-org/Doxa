[profile.default]
src = "src/pending-deposit"
test = "test/pending-deposit"
script = "script/pending-deposit"
out = "out"
libs = ["lib"]

# Allow tests to read proof/calldata JSON from the groth-artifacts directory
fs_permissions = [
  { access = "read", path = "../tessera-server/artifacts/pending-deposit/groth-artifacts" },
  { access = "read", path = "../tessera-server/artifacts/used-deposit/groth-artifacts" },
  { access = "read", path = "src/pending-deposit" }
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
