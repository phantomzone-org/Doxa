[profile.default]
src = "src"
test = "test"
script = "script/pending-deposit"
out = "out"
libs = ["lib"]
cache_path = ".foundry-cache"
via_ir = true
optimizer = true
optimizer_runs = 100000

# Allow tests to read proof/calldata JSON from the groth-artifacts directory
fs_permissions = [
  { access = "read", path = "../tessera-server/artifacts/super-aggregator/groth-artifacts" },
  { access = "read", path = "src/pending-deposit" }
]

[lint]
exclude_lints = [
  "mixed-case-function",
  "mixed-case-variable",
  "screaming-snake-case-immutable",
  "screaming-snake-case-const",
  "unsafe-cheatcode"
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
